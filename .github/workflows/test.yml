name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  changes:
    name: detect test scope
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.filter.outputs.run_all }}
      sdk: ${{ steps.filter.outputs.sdk }}
      cli: ${{ steps.filter.outputs.cli }}
      tui: ${{ steps.filter.outputs.tui }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            run_all:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tests/conftest.py'
              - '.github/workflows/test.yml'
              - '.github/workflows/main-post-merge.yml'
              - '.github/workflows/publish-testpypi.yml'
            sdk:
              - 'netbox_sdk/**'
              - 'tests/test_api_auth.py'
              - 'tests/test_api_cache.py'
              - 'tests/test_config_profiles.py'
              - 'tests/test_demo_auth.py'
              - 'tests/test_logging_runtime.py'
              - 'tests/test_mock_api.py'
              - 'tests/test_output_safety.py'
              - 'tests/test_plugin_discovery.py'
              - 'tests/test_schema_index.py'
              - 'tests/test_docs_alignment.py'
              - 'tests/test_return_annotations.py'
              - 'tests/test_sdk_completeness.py'
              - 'tests/test_sdk_imports.py'
              - 'tests/test_sdk_pynetbox_parity.py'
              - 'tests/test_services.py'
              - 'tests/test_typed_sdk.py'
              - 'tests/test_security_sdk.py'
            cli:
              - 'netbox_cli/**'
              - 'tests/test_cli_error_handling.py'
              - 'tests/test_cli_new_options.py'
              - 'tests/test_cli_trace.py'
              - 'tests/test_demo_cli.py'
              - 'tests/test_demo_runtime_refresh.py'
              - 'tests/test_docgen_paths.py'
              - 'tests/test_graphql.py'
              - 'tests/test_instance_isolation.py'
              - 'tests/test_markdown_output.py'
              - 'tests/test_security_cli.py'
            tui:
              - 'netbox_tui/**'
              - 'tests/test_cli_tui.py'
              - 'tests/test_cli_tui_theme.py'
              - 'tests/test_dev_tui.py'
              - 'tests/test_django_model_tui.py'
              - 'tests/test_logo_render.py'
              - 'tests/test_logs_tui.py'
              - 'tests/test_no_hardcoded_colors.py'
              - 'tests/test_theme_registry.py'
              - 'tests/test_tui_interaction.py'
              - 'tests/test_security_tui.py'

  # ------------------------------------------------------------------ #
  # Branch / PR jobs — mock API only, no real NetBox container          #
  # ------------------------------------------------------------------ #

  test-sdk:
    name: sdk suite / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all != 'true' && needs.changes.outputs.sdk == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run netbox_sdk suite (with mock API)
        run: uv run pytest -v --tb=short -p no:randomly -m suite_sdk

  test-cli:
    name: cli suite / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all != 'true' && needs.changes.outputs.cli == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run netbox_cli suite
        run: uv run pytest -v --tb=short -p no:randomly -m suite_cli

  test-tui:
    name: tui suite / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all != 'true' && needs.changes.outputs.tui == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run netbox_tui suite
        run: uv run pytest -v --tb=short -p no:randomly -m suite_tui

  test-all-mock:
    name: full suite / mock API / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run full test suite (mock API)
        run: uv run pytest -v --tb=short -p no:randomly

  # ------------------------------------------------------------------ #
  # main branch — mock API suite + real NetBox container                #
  # ------------------------------------------------------------------ #

  test-all-mock-main:
    name: full suite / mock API / Python ${{ matrix.python-version }} [main]
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run full test suite (mock API)
        run: uv run pytest -v --tb=short -p no:randomly

  test-live-netbox:
    name: live NetBox ${{ matrix.netbox-version }} / Python 3.11
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        netbox-version: ["v4.5.8", "v4.5.9", "v4.6.0"]
    # Only postgres and redis as service containers — netbox is started
    # manually in a step so postgres is healthy before netbox connects.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: netbox
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netbox"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Set up Python 3.13 for source NetBox fallback
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Start NetBox container
        # postgres and redis are healthy before this step runs (GitHub Actions
        # guarantees service container health before starting steps).
        # Use --network host so the container reaches localhost:5432 / :6379.
        run: |
          set -euo pipefail

          image="ghcr.io/netbox-community/netbox:${{ matrix.netbox-version }}"
          token_key="ci1234567890"
          token="0123456789abcdef0123456789abcdef01234567"
          token_pepper="ci-token-pepper-for-testing-only-not-for-production-use-12345"

          if docker pull "$image"; then
            echo "Starting NetBox from $image"
            docker run -d \
              --name netbox-ci \
              --network host \
              -e SECRET_KEY="ci-secret-key-for-testing-only-not-for-production-use" \
              -e API_TOKEN_PEPPER_1="$token_pepper" \
              -e ALLOWED_HOSTS="*" \
              -e DB_HOST=127.0.0.1 \
              -e DB_PORT=5432 \
              -e DB_NAME=netbox \
              -e DB_USER=netbox \
              -e DB_PASSWORD=netbox \
              -e REDIS_HOST=127.0.0.1 \
              -e REDIS_PORT=6379 \
              -e SUPERUSER_NAME=admin \
              -e SUPERUSER_EMAIL=admin@example.com \
              -e SUPERUSER_PASSWORD=netbox-test-password \
              -e SUPERUSER_API_TOKEN="$token" \
              "$image"
            echo "NETBOX_CI_BACKEND=docker" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Docker image $image is unavailable; falling back to source checkout"
          git clone --depth 1 --branch "${{ matrix.netbox-version }}" \
            https://github.com/netbox-community/netbox.git /tmp/netbox-source

          cat > /tmp/netbox-source/netbox/netbox/configuration.py <<'PY'
          ALLOWED_HOSTS = ['*']
          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.postgresql',
                  'NAME': 'netbox',
                  'USER': 'netbox',
                  'PASSWORD': 'netbox',
                  'HOST': '127.0.0.1',
                  'PORT': '5432',
                  'CONN_MAX_AGE': 300,
              }
          }
          REDIS = {
              'tasks': {
                  'HOST': '127.0.0.1',
                  'PORT': 6379,
                  'USERNAME': '',
                  'PASSWORD': '',
                  'DATABASE': 0,
                  'SSL': False,
              },
              'caching': {
                  'HOST': '127.0.0.1',
                  'PORT': 6379,
                  'USERNAME': '',
                  'PASSWORD': '',
                  'DATABASE': 1,
                  'SSL': False,
              },
          }
          SECRET_KEY = 'ci-secret-key-for-testing-only-not-for-production-use-12345'
          API_TOKEN_PEPPERS = {
              1: 'ci-token-pepper-for-testing-only-not-for-production-use-12345',
          }
          DEFAULT_PERMISSIONS = {}
          LOGGING = {'version': 1, 'disable_existing_loggers': True}
          RELEASE_CHECK_URL = None
          PY

          python3 -m venv /tmp/netbox-source-venv
          /tmp/netbox-source-venv/bin/python -m pip install --upgrade pip wheel
          /tmp/netbox-source-venv/bin/python -m pip install -r /tmp/netbox-source/requirements.txt
          /tmp/netbox-source-venv/bin/python /tmp/netbox-source/netbox/manage.py migrate --no-input
          /tmp/netbox-source-venv/bin/python /tmp/netbox-source/netbox/manage.py shell <<PY
          from users.choices import TokenVersionChoices
          from users.models import Token, User

          token_key = "$token_key"
          token = "$token"
          user, _ = User.objects.get_or_create(username="admin", defaults={"email": "admin@example.com"})
          user.email = "admin@example.com"
          user.is_staff = True
          user.is_superuser = True
          user.set_password("netbox-test-password")
          user.save()
          Token.objects.filter(user=user, description="CI live-test token").delete()
          Token.objects.filter(key=token_key).delete()
          Token.objects.create(
              user=user,
              description="CI live-test token",
              version=TokenVersionChoices.V2,
              key=token_key,
              token=token,
              write_enabled=True,
          )
          PY
          /tmp/netbox-source-venv/bin/python /tmp/netbox-source/netbox/manage.py runserver \
            0.0.0.0:8080 --insecure > /tmp/netbox-source.log 2>&1 &
          echo "$!" > /tmp/netbox-source.pid
          echo "NETBOX_CI_BACKEND=source" >> "$GITHUB_ENV"

      - name: Wait for NetBox to be ready
        run: |
          set -euo pipefail
          echo "Waiting for NetBox to be ready..."
          for i in $(seq 1 60); do
            code=$(curl -sS -o /tmp/netbox-ready-body -w "%{http_code}" \
              http://localhost:8080/ 2>/dev/null || true)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "403" ]; then
              echo "NetBox HTTP endpoint is ready with status $code"
              exit 0
            fi
            echo "  attempt $i/60 - not ready yet, sleeping 10s"
            sleep 10
          done
          echo "NetBox did not become ready"
          docker logs --tail 200 netbox-ci 2>/dev/null || true
          tail -n 200 /tmp/netbox-source.log 2>/dev/null || true
          exit 1

      - name: Ensure CI API token
        run: |
          set -euo pipefail

          token_key="ci1234567890"
          token_secret="0123456789abcdef0123456789abcdef01234567"
          token_script=$(mktemp)
          cat > "$token_script" <<PY
          from users.choices import TokenVersionChoices
          from users.models import Token, User

          token_key = "$token_key"
          token_secret = "$token_secret"
          user, _ = User.objects.get_or_create(username="admin", defaults={"email": "admin@example.com"})
          user.email = "admin@example.com"
          user.is_staff = True
          user.is_superuser = True
          user.set_password("netbox-test-password")
          user.save()
          Token.objects.filter(user=user, description="CI live-test token").delete()
          Token.objects.filter(key=token_key).delete()
          Token.objects.create(
              user=user,
              description="CI live-test token",
              version=TokenVersionChoices.V2,
              key=token_key,
              token=token_secret,
              write_enabled=True,
          )
          PY

          if [ "${NETBOX_CI_BACKEND:-}" = "docker" ]; then
            docker exec -i netbox-ci /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < "$token_script"
          else
            /tmp/netbox-source-venv/bin/python /tmp/netbox-source/netbox/manage.py shell < "$token_script"
          fi

          auth="Bearer nbt_${token_key}.${token_secret}"
          status_code=$(curl -sS -o /tmp/netbox-status.json -w "%{http_code}" \
            -H "Authorization: $auth" http://localhost:8080/api/status/ || true)
          if [ "$status_code" != "200" ]; then
            echo "Authenticated /api/status/ check failed with HTTP $status_code"
            cat /tmp/netbox-status.json 2>/dev/null || true
            docker logs --tail 200 netbox-ci 2>/dev/null || true
            tail -n 200 /tmp/netbox-source.log 2>/dev/null || true
            exit 1
          fi

          python3 -c "import json,sys; print('NetBox API status:', json.load(open('/tmp/netbox-status.json')).get('netbox-version', 'unknown'))"

      - name: Set NetBox connection env vars
        run: |
          echo "NETBOX_TOKEN=nbt_ci1234567890.0123456789abcdef0123456789abcdef01234567" >> $GITHUB_ENV
          echo "NETBOX_TOKEN_KEY=ci1234567890" >> $GITHUB_ENV
          echo "NETBOX_TOKEN_SECRET=0123456789abcdef0123456789abcdef01234567" >> $GITHUB_ENV
          echo "NETBOX_URL=http://localhost:8080" >> $GITHUB_ENV

      - name: Run live NetBox integration tests
        env:
          NETBOX_URL: ${{ env.NETBOX_URL }}
          NETBOX_TOKEN: ${{ env.NETBOX_TOKEN }}
          NETBOX_TOKEN_KEY: ${{ env.NETBOX_TOKEN_KEY }}
          NETBOX_TOKEN_SECRET: ${{ env.NETBOX_TOKEN_SECRET }}
          NETBOX_LIVE_TEST: "1"
        run: uv run pytest -v --tb=short -p no:randomly -m suite_sdk

      - name: Dump NetBox logs on failure
        if: failure()
        run: |
          docker logs --tail 200 netbox-ci 2>/dev/null || true
          tail -n 200 /tmp/netbox-source.log 2>/dev/null || true

      - name: Stop NetBox
        if: always()
        run: |
          if [ -f /tmp/netbox-source.pid ]; then
            kill "$(cat /tmp/netbox-source.pid)" 2>/dev/null || true
          fi
          docker rm -f netbox-ci 2>/dev/null || true
